Use them whenever a follow-up, reminder, event, or lesson plan is the natural outcome. Never claim you saved something — the teacher approves each block.
5. BE CONCISE by default (a few sentences); expand only for lesson plans, quizzes, drafts. Use **bold** sparingly and "- " bullets for lists.
6. Respect AMAN conventions: tagline "Youth Educated… Family Cultivated… World Illuminated", الأمانة always with ال, warm respectful tone with parents, Islamic phrases natural (in sha Allah, ma sha Allah).`;
Registry.register({ id:'ai', name:'AI Assistant', icon:'spark', group:'Intelligence',
render(v){
  v.innerHTML = `<div class="eyebrow">AI Workspace · Operations Manager</div><h2 class="page-title">Assistant</h2>
   <p class="page-sub">Sees the whole school live — students, tuition, tasks, curriculum, resources. Explains every recommendation with the data behind it.</p>
   <div class="ai-wrap"><div class="ai-msgs" id="aiMsgs"></div>
    <div class="ai-chips no-print" id="aiChips">
     ${['Build this weekend’s lesson plan','Who needs memorization review, and why?','Who is ready for promotion?','Draft a parent announcement','Which families need tuition follow-up?','Generate homework for Level 1','Summarize this month’s progress','What should I prioritize this week?'].map(c=>`<button class="chip" data-chip="${esc(c)}">${esc(c)}</button>`).join('')}
     <button class="chip" id="aiNew" style="margin-left:auto">🗑 New chat</button></div>
    <div class="ai-input no-print"><input id="aiQ" placeholder="Ask anything, or tell me what to prepare…"><button class="btn btn-p" id="aiSend">Send</button></div></div>`;
  const msgs=$('#aiMsgs',v), q=$('#aiQ',v);
  const add=(cls,html)=>{ const m=document.createElement('div'); m.className='msg '+cls; m.innerHTML=html; msgs.append(m); msgs.scrollTop=msgs.scrollHeight; return m; };
  AIx.history = AIx.history||[];
  const render=el=>{ AIx.wire(el); };
  // restore or open with proactive briefing (computed locally — instant, offline, rule-transparent)
  if(AIx.history.length){ AIx.history.forEach(h=>{ const el=add(h.role==='user'?'user':'ai', h.role==='user'?esc(h.content):AIx.format(h.content)); if(h.role!=='user') render(el); }); }
  else render(add('ai', AIx.briefing()));
  async function send(text){
    if(!text.trim()) return;
    add('user', esc(text)); q.value='';
    const typing=add('ai','<span class="typing"><i></i><i></i><i></i></span>');
    AIx.history.push({role:'user', content:text});
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:2000,
          system: AI_SYSTEM+'\n\n'+aiContext(),
          messages: AIx.history.slice(-12) })});
      const data=await resp.json();
      const out=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'(no reply)';
      AIx.history.push({role:'assistant', content:out});
      typing.innerHTML=AIx.format(out); render(typing);
    }catch(e){
      const local=AIx.local(text);
      typing.innerHTML=local; render(typing);
    }
    msgs.scrollTop=msgs.scrollHeight;
  }
  $('#aiSend',v).onclick=()=>send(q.value);
  q.onkeydown=e=>{ if(e.key==='Enter') send(q.value); };
  $$('button[data-chip]',v).forEach(b=>b.onclick=()=>send(b.dataset.chip));
  $('#aiNew',v).onclick=()=>{ AIx.history=[]; Router.render(); };
  const pre=sessionStorage.getItem('ai_q'); if(pre){ sessionStorage.removeItem('ai_q'); send(pre); } else q.focus();
}});
const AIx = {
  history:[],
  /* ---- render: tokens → buttons, action blocks → approval cards, markdown-lite ---- */
  format(raw){
    let h=esc(raw);
    // action blocks
    h=h.replace(/\[\[task:\s*([^\]|]+?)(?:\s*\|\s*([\d-]{0,10}))?\s*\]\]/g,(m,txt,due)=>
      `<div class="ai-act" data-act="task" data-a="${esc(txt.trim())}" data-b="${esc(due||'')}">☑️ <span><b>Task:</b> ${esc(txt.trim())}${due?' · due '+esc(due):''}</span><button class="btn btn-p btn-sm">Add</button></div>`);
    h=h.replace(/\[\[event:\s*([\d-]{8,10})\s*\|\s*([^\]]+?)\s*\]\]/g,(m,dt,ti)=>
      `<div class="ai-act" data-act="event" data-a="${esc(dt)}" data-b="${esc(ti)}">🗓️ <span><b>Event:</b> ${esc(ti)} · ${esc(dt)}</span><button class="btn btn-p btn-sm">Add</button></div>`);
    h=h.replace(/\[\[lesson:\s*([\d-]{8,10})\s*\|\s*([^|\]]+?)\s*\|\s*([^\]]*?)\s*\]\]/g,(m,dt,ti,obj)=>
      `<div class="ai-act" data-act="lesson" data-a="${esc(dt)}" data-b="${esc(ti)}" data-c="${esc(obj)}">📝 <span><b>Lesson:</b> ${esc(ti)} · ${esc(dt)}</span><button class="btn btn-p btn-sm">Add</button></div>`);
    // entity tokens → buttons (resources and students share one namespace)
    h=h.replace(/\{\{([a-z0-9-]+)\}\}/gi,(m,id)=>{ const r=DB.res(id);
      if(r) return `<button class="rlink" data-r="${r.id}">${TYPE_ICON[r.type]||'📄'} ${esc(r.title)}</button>`;
      const s=DB.data.students.find(x=>x.id===id);
      if(s) return `<button class="rlink" data-s="${s.id}">🎓 ${esc(s.name)}</button>`;
      return esc(id); });
    // markdown-lite
    h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
    h=h.split('\n').map(line=> line.startsWith('- ')? '<div style="padding-left:14px">• '+line.slice(2)+'</div>' : line).join('\n');
    return h.replace(/\n/g,'<br>').replace(/(<\/div>)<br>/g,'$1');
  },
  wire(el){
    $$('.rlink[data-r]',el).forEach(b=>b.onclick=()=>Router.go('#/resource/'+b.dataset.r));
    $$('.rlink[data-s]',el).forEach(b=>b.onclick=()=>Router.go('#/students/'+b.dataset.s));
    $$('.ai-act',el).forEach(card=>{ const btn=$('button',card); if(!btn) return;
      btn.onclick=()=>{ const k=card.dataset.act, a=card.dataset.a, b=card.dataset.b, c=card.dataset.c||'';
        if(k==='task'){ DB.data.tasks.unshift({id:uid(), text:a, due:b, done:false, pri:'Normal', cat:'General', link:''}); DB.log('Task added via AI: '+a); }
        if(k==='event'){ DB.data.events.push({id:uid(), date:a, title:b, kind:'event', checklist:[]}); DB.log('Event added via AI: '+b); }
        if(k==='lesson'){ DB.data.lessons.unshift({id:uid(), title:b, subject:'Islamic Studies', date:a, est:null, objective:c, plan:'', materials:[], matDone:[], resources:[], taught:false}); DB.log('Lesson added via AI: '+b); }
        DB.save(); btn.textContent='Added ✓'; btn.disabled=true; btn.classList.remove('btn-p'); btn.classList.add('btn-o'); toast('Approved — added to '+(k==='task'?'Tasks':k==='event'?'Calendar':'Lesson Plans')); };});
  },
  /* ---- proactive briefing: local rules, instant, transparent ---- */
  briefing(){
    const d=DB.data, tdy=today();
    const act=d.students.filter(s=>s.active!==false);
    const a30=new Date(Date.now()-30*864e5).toISOString().slice(0,10);
    const flags=stuFlags(a30,tdy);
    const behind=flags.filter(x=>x.flags.some(f=>f[0]==='behind'));
    // promotion-ready (same rules as Students module)
    const promo=[];
    act.forEach(s=>{ if(s.level==='Level 1' && s.gb && s.gb.page>=GB_TOTAL) promo.push({s, why:'Green Book complete ('+s.gb.page+'/160)'});
      if(s.level==='Level 2'){ const log=[...(s.musLog||[])].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
        if(log.length>=3 && log.every(x=>x.fluency==='Strong')) promo.push({s, why:'3 consecutive Strong readings'}); }});
    const fams=famList().filter(f=>!f.solo);
    const due=fams.filter(f=>{const fin=famFinance(f.key); return fin.plan.monthly>0&&fin.monthStatus!=='Paid';});
    const overT=d.tasks.filter(t=>!t.done&&t.due&&t.due<tdy);
    const nextEv=d.events.filter(e=>e.date>=tdy).sort((a,b)=>a.date.localeCompare(b.date))[0];
    const gaps=d.resources.filter(r=>r.status==='Planned');
    const line=(i,txt)=>`<div style="margin:5px 0">${i} ${txt}</div>`;
    let h=`As-salāmu ʿalaykum, Ustāth. Here's the state of the school before you ask:<br>`;
    if(nextEv) h+=line('🗓️',`Next: <b>${esc(nextEv.title)}</b> · ${fmtDate(nextEv.date)}`);
    if(promo.length) h+=line('🎉',`<b>Ready for promotion:</b> ${promo.map(p=>`<button class="rlink" data-s="${p.s.id}" style="display:inline;margin:2px 4px 2px 0">🎓 ${esc(p.s.name)}</button> <span style="font-size:12px;color:var(--ink3)">(${esc(p.why)})</span>`).join(' ')}`);
    if(behind.length) h+=line('📖',`<b>${behind.length} student${behind.length>1?'s':''} behind</b> — ${behind.slice(0,3).map(x=>`<button class="rlink" data-s="${x.s.id}" style="display:inline;margin:2px 4px 2px 0">${esc(x.s.name)}</button> <span style="font-size:12px;color:var(--ink3)">(${esc(x.flags.map(f=>f[1]).join('; '))})</span>`).join(' ')}${behind.length>3?' +'+(behind.length-3)+' more':''}`);
    if(due.length) h+=line('💵',`<b>${due.length} famil${due.length>1?'ies':'y'}</b> not fully paid this month`);
    if(overT.length) h+=line('⏰',`<b>${overT.length} overdue task${overT.length>1?'s':''}</b> — oldest: ${esc(overT[0].text)}`);
    if(gaps.length) h+=line('🧩',`Curriculum gaps: ${gaps.map(g=>esc(g.title.split('—')[0].trim())).join(' · ')}`);
    if(!promo.length&&!behind.length&&!due.length&&!overT.length) h+=line('✅','Nothing urgent, al-ḥamdu lillāh.');
    h+=`<br><span style="font-size:12px;color:var(--ink3)">Every item above shows the rule that fired. Ask me anything — I'll answer from live data and explain with the numbers.</span>`;
    return h;
  },
  /* ---- offline fallback: local answers, not just search ---- */
  local(text){
    const tx=text.toLowerCase();
    if(/behind|review|support|struggl/.test(tx)){
      const b=stuFlags(new Date(Date.now()-30*864e5).toISOString().slice(0,10), today()).filter(x=>x.flags.some(f=>f[0]==='behind'));
      return 'Offline — computed locally:<br>'+(b.length? b.map(x=>`<button class="rlink" data-s="${x.s.id}">🎓 ${esc(x.s.name)}</button> <span style="font-size:12px;color:var(--ink3)">${esc(x.flags.map(f=>f[1]).join('; '))}</span>`).join('<br>') : 'No one flagged behind in the last 30 days.');
    }
    if(/promot/.test(tx)) return 'Offline — computed locally:<br>'+this.briefing();
    const hits=Search.run(text,5);
    return 'Offline right now — closest Knowledge Base matches:'+(hits.length? hits.map(r=>`<button class="rlink" data-r="${r.id}">${TYPE_ICON[r.type]||'📄'} ${esc(r.title)}</button>`).join('') : '<br>No local matches. Full answers need internet.');
  }
};

// ---------- authentication (client-side lock screen — see setup notes) ----------
// This is a deterrent, not real security: the file has no server, so the
// username/password below are visible to anyone who views the page source,
// and the check can be bypassed entirely via the browser console. It stops
// casual access to the file/device; it does not stop a determined user.
const AUTH_USER = 'Admin', AUTH_PASS = 'Aman@2020', AUTH_KEY = 'aman_central_auth';
function bootApp(){
  DB.load();
  Theme.apply(DB.data.settings.theme||'light');
  buildNav();
  $('#openPalette').onclick=()=>Palette.open();
  $('#quickAdd').onclick=()=>ResourceForm.open();

  $('#logoutBtn').onclick=()=>confirmBox('Log out of AMAN Central?', doLogout);
  $('#hambBtn').onclick=()=>$('#sidebar').classList.toggle('open');
  document.addEventListener('click', e=>{ if(window.innerWidth<=900 && !e.target.closest('#sidebar') && !e.target.closest('#hambBtn')) $('#sidebar').classList.remove('open'); });
  Router.render();
}
function showApp(){
  $('#loginScreen').style.display='none';
  $('#app').style.display='';
  bootApp();
}
function doLogin(){
  const u=$('#login-user').value.trim(), p=$('#login-pass').value, err=$('#login-err');
  if(u===AUTH_USER && p===AUTH_PASS){
    sessionStorage.setItem(AUTH_KEY,'ok');
    err.style.display='none';
    showApp();
  } else {
    err.textContent='Incorrect username or password.';
    err.style.display='block';
    $('#login-pass').value='';
    $('#login-pass').focus();
  }
}
function doLogout(){ sessionStorage.removeItem(AUTH_KEY); location.reload(); }
$('#login-btn').onclick=doLogin;
$('#login-user').addEventListener('keydown', e=>{ if(e.key==='Enter') $('#login-pass').focus(); });
$('#login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
wireFieldLabels(document);
if(sessionStorage.getItem(AUTH_KEY)==='ok'){ showApp(); } else { $('#login-user').focus(); }
